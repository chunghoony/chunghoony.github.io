<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
<meta name="robots" content="index, follow">
<title>{{ page.title | default: site.title }}</title>
<meta name="description" content="{{ page.description | default: site.description }}">
<meta name="author" content="{{ site.author }}">
<link rel="canonical" href="{{ page.url | absolute_url }}">
<link crossorigin="anonymous" href="{{ '/assets/css/main.css' | relative_url }}" rel="preload stylesheet" as="style">
<link rel="icon" href="{{ '/assets/favicon_wine.ico' | relative_url }}">
<meta name="theme-color" content="#2e2e33">
<meta name="msapplication-TileColor" content="#2e2e33">
<link rel="alternate" type="application/rss+xml" href="{{ '/feed.xml' | relative_url }}">
<noscript>
    <style>
        #theme-toggle,
        .top-link {
            display: none;
        }
    </style>
</noscript>
<style>
    :root {
        --theme: #fff;
        --entry: #fff;
        --primary: #000;
        --secondary: #666;
        --tertiary: #999;
        --content: #333;
        --hljs-bg: #f5f5f5;
        --code-bg: #f5f5f5;
        --border: #eee;
    }

    @media (prefers-color-scheme: dark) {
        :root {
            --theme: rgb(29, 30, 32);
            --entry: rgb(46, 46, 51);
            --primary: rgb(218, 218, 219);
            --secondary: rgb(155, 156, 157);
            --tertiary: rgb(65, 66, 68);
            --content: rgb(196, 196, 197);
            --hljs-bg: rgb(46, 46, 51);
            --code-bg: rgb(55, 56, 62);
            --border: rgb(51, 51, 51);
        }

        .list {
            background: var(--theme);
        }

        .list:not(.dark)::-webkit-scrollbar-track {
            background: 0 0;
        }

        .list:not(.dark)::-webkit-scrollbar-thumb {
            border-color: var(--theme);
        }
    }
</style>
</noscript>
