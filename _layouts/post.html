---
layout: default
---

<article class="post-single">
    <header class="post-header">
        <h1 class="post-title">
            {{ page.title }}
        </h1>
        <div class="post-meta">
            Date: {{ page.date | date: "%B %-d, %Y" }} | Author: {{ page.author | default: site.author }}
        </div>
    </header>
    <div class="post-content">
        {{ content }}
    </div>
    <footer class="post-footer">
        {% if page.tags %}
        <ul class="post-tags">
            {% for tag in page.tags %}
            <li><a href="{{ '/tags/' | relative_url }}#{{ tag | slugify }}">{{ tag }}</a></li>
            {% endfor %}
        </ul>
        {% endif %}
    </footer>
</article>
